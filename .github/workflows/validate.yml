name: Validate Skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild curated skills
        run: ./scripts/sync-turbosnap-wrappers.sh
      - name: Rebuild prompt adapters
        run: ./scripts/build-prompt-adapters.sh
      - name: Validate skills
        run: ./scripts/validate-skills.sh
      - name: Verify generated files are committed
        run: git diff --exit-code
